server:
  port: 8080

spring:
  application:
    name: agent-cug-backend
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:h2:file:./data/agentcug;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  web:
    resources:
      static-locations: file:./uploads/

jwt:
  secret: ${JWT_SECRET:agent-cug-dev-secret-key-please-change-in-production}
  expiration: 86400000

app:
  upload-dir: ./uploads

ai:
  rag-gateway:
    base-url: http://localhost:3001
  docling:
    base-url: ${DOCLING_BASE_URL:http://localhost:5001}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
    base-url: https://api.deepseek.com

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.agentcug: DEBUG
    org.springframework.security: INFO