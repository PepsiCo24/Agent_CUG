<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent_CUG — AI 助手</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- ====== 侧边栏 ====== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn" title="新对话">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>新对话</span>
                </button>
                <button class="toggle-sidebar-btn" id="toggleSidebarBtn" title="收起侧边栏">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Agent_CUG</div>
                <nav class="sidebar-nav">
                    <a href="#" class="sidebar-nav-item active" data-panel="chat">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>对话</span>
                    </a>
                    <a href="#" class="sidebar-nav-item" data-panel="rag">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <span>知识库</span>
                    </a>
                    <a href="#" class="sidebar-nav-item" data-panel="settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>设置</span>
                    </a>
                </nav>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">历史会话</div>
                <div class="history-list" id="historyList">
                    <div class="history-empty">暂无会话记录</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">🤖</div>
                    <div class="user-name">Agent_CUG</div>
                </div>
            </div>
        </aside>

        <!-- ====== 主区域 ====== -->
        <main class="main-content">
            <!-- 对话面板 -->
            <div class="panel active" id="chatPanel">
                <!-- 顶部栏 -->
                <header class="chat-header">
                    <div class="model-selector">
                        <span class="model-badge" id="modelBadge">mimo-v2.5-pro</span>
                    </div>
                    <div class="header-actions">
                        <button class="icon-btn" id="openSidebarBtn" title="展开侧边栏" style="display:none">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                                <line x1="9" y1="3" x2="9" y2="21"></line>
                            </svg>
                        </button>
                    </div>
                </header>

                <!-- 消息区域 -->
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-logo">🤖</div>
                        <h1>Agent_CUG</h1>
                        <p class="welcome-subtitle">智能 AI 助手 · 支持 RAG · 工具调用 · 记忆</p>
                        <div class="suggestion-chips">
                            <button class="chip" data-prompt="帮我计算 (123 + 456) * 7 等于多少？">🧮 计算 (123+456)×7</button>
                            <button class="chip" data-prompt="现在是什么时间？">🕐 查询时间</button>
                            <button class="chip" data-prompt="介绍一下 Agent Operating System 的概念">📚 介绍 Agent OS</button>
                            <button class="chip" data-prompt="什么是 RAG？它有哪些优势？">🔍 什么是 RAG？</button>
                        </div>
                    </div>
                </div>

                <!-- 输入区域 -->
                <div class="chat-input-area">
                    <div class="input-container">
                        <div class="input-actions-left">
                            <button class="icon-btn upload-btn" id="uploadBtn" title="上传文件到知识库">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                </svg>
                            </button>
                            <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" style="display:none" multiple>
                        </div>
                        <textarea
                            id="messageInput"
                            class="message-input"
                            placeholder="发送消息..."
                            rows="1"
                            autofocus
                        ></textarea>
                        <button class="send-btn" id="sendBtn" title="发送">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="input-footer">Agent_CUG · mimo-v2.5-pro · 内容由 AI 生成，仅供参考</p>
                </div>
            </div>

            <!-- 知识库面板 -->
            <div class="panel" id="ragPanel">
                <header class="chat-header">
                    <h2>📚 知识库管理</h2>
                    <span class="doc-count" id="docCount">文档: 0</span>
                </header>
                <div class="rag-content">
                    <div class="rag-upload-section">
                        <h3>上传文档</h3>
                        <p>支持 PDF、DOCX、TXT、Markdown 格式</p>
                        <div class="upload-dropzone" id="uploadDropzone">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p>拖拽文件到这里或点击上传</p>
                            <input type="file" id="ragFileInput" accept=".pdf,.docx,.txt,.md" multiple style="display:none">
                        </div>
                        <div class="upload-status" id="uploadStatus"></div>
                    </div>

                    <div class="rag-query-section">
                        <h3>检索测试</h3>
                        <div class="rag-query-input">
                            <input type="text" id="ragQueryInput" placeholder="输入查询文本测试检索...">
                            <button class="btn-primary" id="ragQueryBtn">检索</button>
                        </div>
                        <div class="rag-results" id="ragResults"></div>
                    </div>
                </div>
            </div>

            <!-- 设置面板 -->
            <div class="panel" id="settingsPanel">
                <header class="chat-header">
                    <h2>⚙️ 系统设置</h2>
                </header>
                <div class="settings-content">
                    <div class="settings-group">
                        <h3>模型配置</h3>
                        <div class="setting-item">
                            <label>LLM Provider</label>
                            <span class="setting-value" id="settingProvider">-</span>
                        </div>
                        <div class="setting-item">
                            <label>LLM Model</label>
                            <span class="setting-value" id="settingModel">-</span>
                        </div>
                        <div class="setting-item">
                            <label>Embedding Model</label>
                            <span class="setting-value" id="settingEmbedding">-</span>
                        </div>
                    </div>
                    <div class="settings-group">
                        <h3>知识库</h3>
                        <div class="setting-item">
                            <label>文档数量</label>
                            <span class="setting-value" id="settingDocCount">-</span>
                        </div>
                        <div class="setting-item">
                            <label>RAG 状态</label>
                            <span class="setting-value status-ok" id="settingRagStatus">✅ 已启用</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
